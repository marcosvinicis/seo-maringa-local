<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Não Encontrada (404) — SEO Maringá</title>
  <meta name="description" content="A página que você procura não foi encontrada. Explore nossos serviços de SEO e GEO em Maringá.">
  <meta name="robots" content="noindex, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
    }
    
    .error-page__code {
      font-family: var(--fonte-primaria);
      font-size: clamp(6rem, 20vw, 12rem);
      line-height: 1;
      color: var(--cor-acento);
      margin-bottom: 24px;
      text-shadow: 0 0 30px rgba(255, 184, 0, 0.2);
    }
    
    .error-page__title {
      font-family: var(--fonte-primaria);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: var(--texto-principal);
      margin-bottom: 16px;
    }
    
    .error-page__text {
      color: var(--texto-secundario);
      max-width: 500px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .error-page__actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .btn--primary {
      background-color: var(--cor-acento);
      color: var(--cor-fundo);
    }
    
    .btn--secondary {
      background-color: transparent;
      border: 1px solid var(--cor-borda);
      color: var(--texto-principal);
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-page__code">404</div>
    <h1 class="error-page__title">Ops! Parece que o caminho sumiu</h1>
    <p class="error-page__text">
      Não conseguimos encontrar a página que você estava buscando. Mas não se preocupe, o melhor caminho para dominar o Google ainda está aqui.
    </p>
    
    <div class="error-page__actions">
      <a href="/" class="btn btn--primary" aria-label="Voltar para a página inicial">Ir para Home</a>
      <a href="/contato.html" class="btn btn--secondary" aria-label="Ir para a página de contato">Falar com Suporte</a>
    </div>
  </main>
</body>
</html>
